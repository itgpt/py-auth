name: Docker Server Build and Push

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'app/**'
      - 'web/**'
      - 'main.py'
      - 'pyproject.toml'
      - '.github/workflows/docker-server.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'app/**'
      - 'web/**'
      - 'main.py'
      - 'pyproject.toml'
      - '.github/workflows/docker-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write # BuildKit cache (cache-to type=gha)

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: GHCR image name (lowercase)
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
