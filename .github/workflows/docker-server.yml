name: Docker Server Build

# 镜像名与 docker-compose.yaml 中 auth-service.image 一致
# Secrets: DOCKERHUB_USERNAME、DOCKERHUB_TOKEN（Docker Hub 访问令牌，作密码使用）

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            jockerdragon/py-auth-service:latest
            jockerdragon/py-auth-service:${{ github.sha }}
