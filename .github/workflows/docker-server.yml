name: Docker Server Build and Push

# 镜像名：与 docker-compose.yaml 中 auth-service.image 保持一致（此处写死）
# 仓库 Secrets: DOCKERHUB_USERNAME、DOCKERHUB_TOKEN（Docker Hub Access Token）

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yaml'
      - 'app/**'
      - 'web/**'
      - 'main.py'
      - 'pyproject.toml'
      - '.github/workflows/docker-server.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yaml'
      - 'app/**'
      - 'web/**'
      - 'main.py'
      - 'pyproject.toml'
      - '.github/workflows/docker-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write # BuildKit cache (cache-to type=gha)

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: jockerdragon/py-auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
